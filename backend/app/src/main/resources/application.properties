spring.application.name=app
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://wwtwbfuqmmyxgcrkzlay.supabase.co/auth/v1
spring.security.oauth2.resourceserver.jwt.jwk-set-uri-connect-timeout=5000
spring.security.oauth2.resourceserver.jwt.jwk-set-uri-read-timeout=15000

server.error.include-message=always
server.error.include-binding-errors=always
server.port=${PORT:8080}

# CORS: set ALLOWED_ORIGIN env var in Render (e.g. https://agenda-app-kappa.vercel.app)
